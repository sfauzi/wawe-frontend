<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Assistant:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
        <link rel="stylesheet" href="frontend/styles/dashboard.css">


    </head>

    <body>
        <div class="container">

            <!-- aside section start -->
            <aside>
                <div class="top">
                    <div class="logo">
                        <a href="index.html"><img src="frontend/images/logo.svg" alt=""></a>
                    </div>
                    <div class="close" id="close_btn">
                        <span class="material-icons">close</span>
                    </div>
                </div>
                <div class="sidebar">
                    <a href="dashboard.html">
                        <!-- <span class="material-icons">grid_view</span> -->

                        <img src="frontend/images/icons/category.png" class="icon-sidebar">
                        <h3>Overview</h3>
                    </a>
                    <a href="ticket.html" class="active">
                        <!-- <span class="material-icons">receipt_long</span> -->
                        <img src="frontend/images/icons/ticket-discount.png" class="icon-sidebar">
                        <h3>My Ticket</h3>
                    </a>
                    <a href="transaction.html">
                        <!-- <span class="material-icons">payments</span> -->
                        <img src="frontend/images/icons/empty-wallet.png" class="icon-sidebar">
                        <h3>My Transaction</h3>
                    </a>

                    <a href="settings.html">
                        <!-- <span class="material-icons">settings</span> -->
                        <img src="frontend/images/icons/setting-3.png" class="icon-sidebar">
                        <h3>Settings</h3>
                    </a>
                </div>
            </aside>
            <!-- aside section end -->

            <!-- main section start -->
            <main>

                <!-- Navbar section start -->
                <nav>
                    <div class="search-container">
                        <input type="text" placeholder="Search...">
                        <button><span class="material-icons">search</span></button>
                    </div>
                    <div class="toggle-btn" id="toggle_btn">
                        <span class="material-icons">menu</span>
                    </div>

                    <div class="user">
                        <span style="color: black;">S Fauzi</span>
                        <img src="frontend/images/member.png" alt="Profile Picture" class="profile-image">
                    </div>
                </nav>
                <!-- Navbar section end -->

                <h1>Testimoni Product</h1>
                <p class="desc-title">
                    Masukkan informasi yang valid <br>agar proses transaksi lebih mudah
                </p>

                <div class="content">
                    <div class="profile-container">
                        <form class="edit-profile-form">

                            <div class="form-group">
                                <label for="full-name">Full Name</label>
                                <input type="text" id="full-name" name="full-name" required>
                            </div>
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" name="email" required>
                            </div>
                            <div class="form-group">
                                <label for="full-name">Message</label>
                                <textarea id="full-name" name="full-name" class="form-control" rows="3"
                                    required></textarea>
                            </div>
                            <div class="photo-upload">

                                <input type="file" id="profile-pic" accept="image/*" onchange="loadFile(event)" />
                                <div class="file-info" id="file-info">Format file jpg, jpeg, png.</div>
                            </div>
                            <button type="submit" class="btn-submit">Send</button>
                        </form>
                    </div>


                </div>


            </main>
            <!-- main section end -->


        </div>

    </body>

    <script src="frontend/scripts/dashboard.js"></script>

</html>
