<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Assistant:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="frontend/styles/dashboard.css">


</head>

<body>
    <div class="container">

        <!-- aside section start -->
        <aside>
            <div class="top">
                <div class="logo">
                    <!-- <h3><span class="danger">Wawe</span></h3> -->
                    <img src="frontend/images/logo.png" alt="">
                </div>
                <div class="close" id="close_btn">
                    <span class="material-icons">close</span>
                </div>
            </div>
            <div class="sidebar">
                <a href="dashboard.html">
                    <!-- <span class="material-icons">grid_view</span> -->

                    <img src="frontend/images/icons/category.png" class="icon-sidebar">
                    <h3>Overview</h3>
                </a>
                <a href="ticket.html">
                    <!-- <span class="material-icons">receipt_long</span> -->
                     <img src="frontend/images/icons/ticket-discount.png" class="icon-sidebar">
                    <h3>My Ticket</h3>
                </a>
                <a href="transaction.html">
                    <!-- <span class="material-icons">payments</span> -->
                     <img src="frontend/images/icons/empty-wallet.png" class="icon-sidebar">
                    <h3>My Transaction</h3>
                </a>

                <a href="settings.html" class="active">
                    <!-- <span class="material-icons">settings</span> -->
                     <img src="frontend/images/icons/setting-3.png" class="icon-sidebar">
                    <h3>Settings</h3>
                </a>
            </div>
        </aside>
        <!-- aside section end -->

        <!-- main section start -->
        <main>

            <!-- Navbar section start -->
            <nav>
                <div class="search-container">
                    <input type="text" placeholder="Search...">
                    <button><span class="material-icons">search</span></button>
                </div>
                <div class="toggle-btn" id="toggle_btn">
                    <span class="material-icons">menu</span>
                </div>

                <div class="user">
                    <span style="color: black;">S Fauzi</span>
                    <img src="frontend/images/member.png" alt="Profile Picture" class="profile-image">
                </div>
            </nav>  
            <!-- Navbar section end -->

            <h1>Edit Password</h1>
            <p class="desc-title"> 
                Amankan akun Anda dengan <br>kombinasi password yang baik
            </p>

            <div class="content">
                <div class="profile-container">
                    <form class="edit-profile-form">
                        
                        
                        <div class="form-group">
                            <label for="password">Old Password</label>
                            <input type="password" id="email" name="password" required>
                        </div>
                        <div class="form-group">
                            <label for="password">New Password</label>
                            <input type="password" id="email" name="password" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Confirm Password</label>
                            <input type="password" id="email" name="password" required>
                        </div>
                        
                        <button type="submit" class="btn-submit">Update Now</button>
                    </form>
                </div>

            </div>
        

        </main>
        <!-- main section end -->


    </div>

</body>

<script src="frontend/scripts/dashboard.js"></script>

</html>
