<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Document</title>
    <link rel="stylesheet" href="frontend/libraries/bootstrap/css/bootstrap.css" />
    <link rel="stylesheet" href="frontend/libraries/xzoom/xzoom.css" />
    <link rel="stylesheet" href="frontend/libraries/gijgo/css/gijgo.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Assistant:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link rel="stylesheet" href="frontend/styles/main.css" />


</head>

<body>

    <!-- Navbar -->
    <div class="container">
        <nav class="row navbar navbar-expand-lg navbar-light bg-white">
            <div class="navbar-nav ml-auto mr-auto mr-sm-auto mr-lg-0 mr-md-auto">
                <a href="index.html" class="navbar-brand">
                    <img src="frontend/images/logo.png" alt="">
                </a>
            </div>
            <ul class="navbar-nav mr-auto d-none d-lg-block">
                <li>
                    <span class="text-muted">
                        | &nbsp; Beyond the explorer of the world
                    </span>
                </li>
            </ul>
        </nav>
    </div>

    <main>

        <div class="success-message">
            <h1>Booking Successfully <br>Congratulations🎉</h1>
        </div>

        <section class="section-scs-header"></section>
        <div class="card-container">
            <div class="custom-card">
                <div class="card-content">
                    <div class="product__info">
                        <div class="product-image">
                            <img src="frontend/images/landing.png" alt="Product Image">
                        </div>
                        <div class="product-details">
                            <h2 class="product-title">Nama Produk</h2>
                            <div class="product-status">
                                <p>SUCCESS</p>
                            </div>
                        </div>
                    </div>
                    <div class="icon-container">
                        <span class="icon">
                            <ion-icon name="calendar-outline"></ion-icon>
                            <!-- Ganti dengan ikon Font Awesome yang sesuai -->
                        </span>
                        <div class="icon-description">
                            <p>15-6-2024</p>
                        </div>
                        <span class="icon">
                            <ion-icon name="people-outline"><!-- Ganti dengan ikon Font Awesome yang sesuai -->
                        </span>
                        <div class="icon-description">
                            <p>1 person</p>
                        </div>
                        <span class="icon">
                            <ion-icon
                                name="pricetag-outline"></ion-icon><!-- Ganti dengan ikon Font Awesome yang sesuai -->
                        </span>
                        <div class="icon-description">
                            <p>Open Trip</p>
                        </div>
                        <span class="icon">
                            <ion-icon name="cash-outline"></ion-icon><!-- Ganti dengan ikon Font Awesome yang sesuai -->
                        </span>
                        <div class="icon-description">
                            <p>Rp 150.000</p>
                        </div>
                    </div>
                    <hr class="divider">
                    <div class="description">
                        <h3>What's Next?</h3>
                        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nulla convallis libero et
                            fringilla.</p>
                    </div>
                    <div class="buttons">
                        <button class="action-button">Message Owner</button>
                        <button class="action-button-secondary">Explore Again</button>
                        <button class="action-button-secondary" onclick="window.location.href = 'dashboard.html';">My
                            Dashboard</button>
                    </div>
                </div>
            </div>
        </div>


        <!-- <div class="section-success d-flex align-items-center">
            <div class="col text-center">
                <img src="frontend/images/success.png" alt="">
                <h1>Yay! Success</h1>
                <p>
                    We've sent you email for trip instruction
                    <br>
                    please read it as well
                </p>
                <a href="index.html" class="btn btn-home-page mt-3 px-5">
                    Home Page
                </a>
            </div>
        </div> -->

        <!-- Footer -->
        <!-- <footer>
            <p>&copy; 2024 Your Company. All rights reserved.</p>
        </footer> -->

    </main>



    <script src="frontend/libraries/jquery/jquery-3.7.1.min.js"></script>
    <script src="frontend/libraries/bootstrap/js/bootstrap.js"></script>
    <script src="frontend/libraries/retina/retina.min.js"></script>
    <script src="frontend/libraries/xzoom/xzoom.min.js"></script>
    <script src="frontend/libraries/gijgo/js/gijgo.min.js"></script>
    <script>
        $(document).ready(function() {
            $('.xzoom, .xzoom-gallery').xzoom({
                zoomWidth: 500,
                title: false,
                tint: '#333',
                Xoffset: 15
            });

            $('.datepicker').datepicker({
                uiLibrary: 'bootstrap4',
                icons: {
                    rightIcon: '<img src="frontend/images/ic_date.png" />'
                }
            })
        });
    </script>
</body>

</html>
